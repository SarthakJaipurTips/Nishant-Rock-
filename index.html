<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sarthak Jaipur</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      color: #fff;
      overflow-x: hidden;
    }

    /* BACKGROUND */
    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("cricket-bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      padding: 40px 20px;
    }

    /* LOGO */
    .logo {
      width: 110px;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 20px rgba(0,255,200,0.6));
    }

    /* TITLE */
    .title {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00f0ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(0,255,255,0.3); }
      to { text-shadow: 0 0 30px rgba(0,255,200,0.9); }
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* STATS */
    .stats {
      margin-top: 45px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 22px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #00ffcc;
    }

    .card h2 {
      font-size: 1.9rem;
      color: #00ffcc;
    }

    .card p {
      margin-top: 6px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* CTA */
    .cta {
      margin-top: 50px;
    }

    .cta a {
      display: inline-block;
      padding: 16px 38px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      background: linear-gradient(90deg, #00ffcc, #00c3ff);
      color: #000;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 0 0 30px rgba(0,255,200,0.6);
    }

    .cta a:hover {
      transform: scale(1.06);
      box-shadow: 0 0 45px rgba(0,255,200,1);
    }

    footer {
      margin-top: 60px;
      font-size: 0.85rem;
      opacity: 0.65;
    }

    @media(max-width: 600px) {
      .title { font-size: 2.4rem; }
      .logo { width: 90px; }
    }
  </style>
</head>

<body>
